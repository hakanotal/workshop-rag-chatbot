<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <style>
      .box      { fill: #EFF4FF; stroke: #2563EB; stroke-width: 2.5; }
      .box-vdb  { fill: #DBEAFE; stroke: #1D4ED8; stroke-width: 3; }
      .label    { fill: #0F172A; font-size: 22px; font-weight: 700; text-anchor: middle; }
      .label-vdb{ fill: #1E3A8A; font-size: 24px; font-weight: 800; text-anchor: middle; letter-spacing: 0.5px; }
      .sub      { fill: #475569; font-size: 15px; text-anchor: middle; }
      .sub-mono { fill: #334155; font-size: 14px; font-family: 'SF Mono', Menlo, Consolas, monospace; }
      .arrow    { stroke: #2563EB; stroke-width: 3; fill: none; }
      .title    { fill: #2563EB; font-size: 26px; font-weight: 800; text-anchor: middle; letter-spacing: 3px; }
      .subtitle { fill: #94A3B8; font-size: 16px; font-style: italic; text-anchor: middle; }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="38" class="title">INDEXING PHASE</text>
  <text x="600" y="62" class="subtitle">run once, offline — build the searchable library</text>

  <!-- Documents -->
  <rect x="60"  y="110" width="220" height="120" rx="14" class="box"/>
  <text x="170" y="165" class="label">Documents</text>
  <text x="170" y="195" class="sub">raw text, PDFs,</text>
  <text x="170" y="215" class="sub">knowledge sources</text>

  <path d="M 280 170 L 345 170" class="arrow" marker-end="url(#arr)"/>

  <!-- Text Chunker -->
  <rect x="345" y="110" width="220" height="120" rx="14" class="box"/>
  <text x="455" y="165" class="label">Text Chunker</text>
  <text x="455" y="195" class="sub">split into overlapping</text>
  <text x="455" y="215" class="sub">~800-char passages</text>

  <path d="M 565 170 L 630 170" class="arrow" marker-end="url(#arr)"/>

  <!-- Embedder -->
  <rect x="630" y="110" width="220" height="120" rx="14" class="box"/>
  <text x="740" y="165" class="label">Embedder</text>
  <text x="740" y="195" class="sub">text → vector</text>
  <text x="740" y="215" class="sub">(768-dim)</text>

  <!-- Elbow arrow down and left into Vector DB -->
  <path d="M 740 230 L 740 290 L 460 290 L 460 310" class="arrow" marker-end="url(#arr)"/>

  <!-- Vector Database (bottom, wide) -->
  <rect x="260" y="310" width="400" height="130" rx="14" class="box-vdb"/>
  <text x="460" y="348" class="label-vdb">Vector Database</text>
  <line x1="290" y1="362" x2="630" y2="362" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="285" y="388" class="sub-mono">chunk 1 → [ 0.12,  0.04, -0.34, ...]</text>
  <text x="285" y="408" class="sub-mono">chunk 2 → [-0.12,  0.03,  0.90, ...]</text>
  <text x="285" y="428" class="sub-mono">chunk 3 → [-0.02,  0.60, -0.54, ...]</text>

  <!-- Right-side annotation -->
  <text x="720" y="360" fill="#475569" font-size="16" font-weight="600">stores:</text>
  <text x="720" y="385" fill="#475569" font-size="15">• the original text chunk</text>
  <text x="720" y="407" fill="#475569" font-size="15">• its embedding vector</text>
  <text x="720" y="429" fill="#475569" font-size="15">• any metadata (source, page…)</text>
</svg>
