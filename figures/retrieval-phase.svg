<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
    <style>
      .box { fill: #EFF4FF; stroke: #2563EB; stroke-width: 2; }
      .box-alt { fill: #FEF3C7; stroke: #D97706; stroke-width: 2; }
      .label { fill: #1E293B; font-size: 15px; font-weight: 600; text-anchor: middle; }
      .label-alt { fill: #7C2D12; font-size: 15px; font-weight: 600; text-anchor: middle; }
      .sub { fill: #64748B; font-size: 12px; text-anchor: middle; }
      .arrow { stroke: #2563EB; stroke-width: 2.5; fill: none; }
      .title { fill: #2563EB; font-size: 20px; font-weight: 700; text-anchor: middle; letter-spacing: 1px; }
    </style>
  </defs>

  <text x="360" y="28" class="title">RETRIEVAL PHASE</text>

  <!-- User Query -->
  <rect x="40" y="80" width="150" height="70" rx="12" class="box"/>
  <text x="115" y="110" class="label">User Query</text>
  <text x="115" y="130" class="sub">"Does the monster have a name?"</text>

  <path d="M 190 115 L 250 115" class="arrow" marker-end="url(#arr2)"/>

  <!-- Embedding Model -->
  <rect x="250" y="80" width="150" height="70" rx="12" class="box"/>
  <text x="325" y="110" class="label">Embedding Model</text>
  <text x="325" y="130" class="sub">query → vector</text>

  <path d="M 400 115 L 460 115" class="arrow" marker-end="url(#arr2)"/>

  <!-- Query Vector -->
  <rect x="460" y="80" width="220" height="70" rx="12" class="box"/>
  <text x="570" y="108" class="label">Query Vector</text>
  <text x="570" y="130" fill="#334155" font-size="11" font-family="monospace" text-anchor="middle">[0.08, -0.21, 0.44, ...]</text>

  <!-- Down arrow from query vector -->
  <path d="M 570 150 L 570 190" class="arrow" marker-end="url(#arr2)"/>

  <!-- Similarity Search (with vector DB) -->
  <rect x="360" y="190" width="300" height="80" rx="12" class="box"/>
  <text x="510" y="220" class="label">Similarity Search</text>
  <text x="510" y="242" class="sub">compare query vs. all chunk vectors</text>
  <text x="510" y="258" class="sub">(cosine similarity → top-K)</text>

  <!-- Left: Vector DB feeding into similarity search -->
  <rect x="40" y="200" width="280" height="60" rx="12" class="box"/>
  <text x="180" y="226" class="label">Vector Database</text>
  <text x="180" y="246" class="sub">indexed chunks from Frankenstein</text>
  <path d="M 320 230 L 360 230" class="arrow" marker-end="url(#arr2)"/>

  <!-- Down from similarity search -->
  <path d="M 510 270 L 510 310" class="arrow" marker-end="url(#arr2)"/>

  <!-- Top-K chunks + Prompt -->
  <rect x="340" y="310" width="340" height="60" rx="12" class="box-alt"/>
  <text x="510" y="336" class="label-alt">Top-K Chunks + Question → Prompt</text>
  <text x="510" y="356" class="sub">stuff retrieved passages into the LLM's context</text>

  <!-- Down to LLM + Response -->
  <path d="M 510 370 L 510 395" class="arrow" marker-end="url(#arr2)"/>

  <text x="510" y="415" class="label">→ LLM → Grounded Answer</text>
</svg>
